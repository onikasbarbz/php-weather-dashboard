<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Weather History</title>
    <link rel="stylesheet" href="weather.css" />
  </head>
  <body>
    <header>
      <h1 align="center" style="color:white">Weather Dashboard</h1>
    </header>
    <a href="index.html" class="back-button">back</a>
    <!--7-day weather history view-->
    <div class="modal" id="modal">
      <div class="modal-content">
        <h2 align="center" style="color: white;" class="weather-city">Weather for the Past 7 Days</h2>
        <div align="center">
          <div class="search">
            <input type="text" placeholder="enter city name" spellcheck="false">
            <button>
              <img src="https://th.bing.com/th/id/OIP.eSd9_97qH0SzO84bg8fpfAHaHa?rs=1&pid=ImgDetMain" class="search-icon">
            </button>
          </div>
        </div>
        <ul id="weatherList"></ul>
      </div>
    </div>
    <footer class="foot">
      <p>Copyright &copy; Luniva Shrestha</p>
    </footer>
    <script>
      const searchBox = document.querySelector(".search input");
      const searchBtn = document.querySelector(".search button");
      const weatherTitle = document.querySelector(".weather-city");

      // fetch 7-day weather history, with localStorage fallback for offline use
      async function openModal(city = "Berlin") {
        const historyUl = document.getElementById("weatherList");
        let data;

        try {
          if (navigator.onLine) {
            const response = await fetch(`/WEATHER-app/backend/main.php?city=${city}&history=true`);
            data = await response.json();
            localStorage.setItem(city, JSON.stringify(data));
          } else {
            data = JSON.parse(localStorage.getItem(city));
          }

          if (!data || data.length === 0) {
            historyUl.innerHTML = "<li>No history found for this city.</li>";
            return;
          }

          weatherTitle.innerText = `Weather for the Past 7 Days of ${city}`;
          historyUl.innerHTML = "";

          const sevenDaysAgo = Date.now() - (7 * 24 * 60 * 60 * 1000);

          data.forEach((entry) => {
            const entryTime = entry.date * 1000;
            // skip entries outside the 7-day window
            if (entryTime < sevenDaysAgo) return;
            const formattedDate = new Date(entryTime).toLocaleDateString("en-US", {
              weekday: "short",
              day: "numeric",
              month: "short",
              hour: "numeric",
            });
            historyUl.innerHTML += `
              <li>
                <p>${formattedDate}</p>
                <img src="https://openweathermap.org/img/wn/${entry.icon}@4x.png">
                <p>Temperature: ${entry.temperature}&deg;C</p>
                <p>Pressure: ${entry.Pressure} hPa</p>
                <p>Wind: ${entry.windSpeed} km/hr</p>
                <p>Humidity: ${entry.humidity}%</p>
              </li>`;
          });

        } catch (error) {
          historyUl.innerHTML = "<li>Something went wrong. Please try again.</li>";
        }
      }

      // event listeners
      searchBtn.addEventListener("click", () => openModal(searchBox.value));
      searchBox.addEventListener("keyup", (e) => {
        if (e.code === "Enter") searchBtn.click();
      });

      // default city on load
      openModal("Berlin");
    </script>
  </body>
</html>
